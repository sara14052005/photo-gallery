<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <!-- Link to your separate CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Photo Gallery</h1>
        <p>Browse and download your favorite photos</p>
    </header>

    <main class="gallery">
        <!-- Photo Card 1 -->
        <div class="photo-card">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600" alt="Mountain Mist">
            <div class="card-content">
                <button class="download-btn" onclick="downloadImage(this)">Download</button>
            </div>
        </div>

        <!-- Photo Card 2 -->
        <div class="photo-card">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600" alt="Forest Sunlight">
            <div class="card-content">
                <button class="download-btn" onclick="downloadImage(this)">Download</button>
            </div>
        </div>

        <!-- Photo Card 3 -->
        <div class="photo-card">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600" alt="Lake View">
            <div class="card-content">
                <button class="download-btn" onclick="downloadImage(this)">Download</button>
            </div>
        </div>
    </main>

    <script>
        // Professional download function that works even with external URLs
        async function downloadImage(button) {
            const img = button.closest('.photo-card').querySelector('img');
            const imageSrc = img.src;
            const fileName = img.alt.toLowerCase().replace(/\s+/g, '-') + '.jpg';

            try {
                const response = await fetch(imageSrc);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                window.URL.revokeObjectURL(url);
            } catch (err) {
                alert("Download failed. Some websites block direct downloads due to security (CORS).");
            }
        }
    </script>
</body>
</html>
